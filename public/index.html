<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PushUp Counter</title>
  <link rel="stylesheet" href="./css/style.css?v=single-day-hourly" />
</head>
<body>
  <section id="auth-screen" class="auth-screen" aria-labelledby="auth-title" hidden>
    <form id="auth-form" class="auth-card">
      <p class="eyebrow">Cloud sync</p>
      <h1 id="auth-title">PushUp Counter</h1>
      <label for="auth-email">Email</label>
      <input id="auth-email" type="email" autocomplete="email" required />
      <label for="auth-password">Parola</label>
      <input id="auth-password" type="password" autocomplete="current-password" required />
      <button id="btn-sign-in" class="primary" type="submit">Intra in cont</button>
      <p id="auth-message" class="auth-message" aria-live="polite"></p>
    </form>
  </section>

  <main class="app-shell">
    <div id="account-bar" class="account-bar" hidden>
      <span id="account-email"></span>
      <span id="sync-status" class="sync-status">Se incarca...</span>
      <button id="btn-sign-out" class="secondary compact-button" type="button">Iesi</button>
    </div>

    <section id="screen-today" class="screen active" aria-labelledby="today-title">
      <header class="topbar">
        <div>
          <p id="today-datetime" class="eyebrow">--</p>
          <h1 id="today-title">PushUp Counter</h1>
        </div>
        <div class="pill"><span id="today-done">0</span> facute</div>
      </header>

      <div class="daily-progress">
        <div class="big-number"><span id="today-remaining">--</span></div>
        <p>ramase din <span id="today-goal">--</span></p>
      </div>

      <div class="actions">
        <button id="btn-start" class="primary" type="button">Start antrenament</button>
      </div>

      <form class="goal-editor" id="goal-form">
        <label for="goal-input">Tinta zilnica</label>
        <input id="goal-input" type="number" inputmode="numeric" min="1" value="100" />
        <button id="btn-save-goal" type="submit">Salveaza</button>
      </form>

      <form class="goal-editor" id="manual-reps-form">
        <label for="manual-reps-input">Flotari azi</label>
        <input id="manual-reps-input" type="number" inputmode="numeric" min="0" value="0" />
        <button id="btn-save-reps" type="submit">Actualizeaza</button>
      </form>
    </section>

    <section id="screen-workout" class="screen" aria-labelledby="workout-title">
      <header class="topbar compact">
        <div>
          <p class="eyebrow">Antrenament</p>
          <h1 id="workout-title">Camera</h1>
        </div>
        <button id="btn-stop" class="secondary" type="button">Stop</button>
      </header>

      <label class="camera-picker" for="camera-mode">
        Camera
        <select id="camera-mode">
          <option value="user">Fata</option>
          <option value="environment">Spate</option>
        </select>
      </label>

      <div class="calibration-panel">
        <p id="calibration-status" class="calibration-status" aria-live="polite">Calibrare necesara.</p>
        <div class="calibration-actions">
          <button id="btn-auto-calibrate" class="secondary" type="button">Calibreaza automat</button>
        </div>
      </div>

      <div class="video-wrap">
        <video id="video" playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div id="rep-count" class="rep-count">0</div>
      </div>
      <p id="detect-status" class="status" aria-live="polite">Porneste pentru a incepe.</p>
    </section>

    <section id="screen-stats" class="screen" aria-labelledby="stats-title">
      <header class="topbar">
        <div>
          <p class="eyebrow">Istoric</p>
          <h1 id="stats-title">Statistici</h1>
        </div>
      </header>

      <div class="today-progress">
        <div class="today-progress-head">
          <span>Azi</span>
          <strong><span id="progress-reps">0</span> / <span id="progress-goal">0</span> · <span id="progress-percent">0</span>%</strong>
        </div>
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
      </div>

      <div class="stat-grid">
        <div class="stat"><span id="stat-total">0</span><label>Total</label></div>
        <div class="stat"><span id="stat-average">0</span><label>Medie/zi <span id="stat-trend" class="trend"></span></label></div>
        <div class="stat"><span id="stat-best">0</span><label>Record/zi</label></div>
        <div class="stat"><span id="stat-streak">0</span><label>Zile la rand <span id="streak-hint" class="streak-hint"></span></label></div>
        <div class="stat"><span id="stat-best-streak">0</span><label>Record zile</label></div>
      </div>

      <div class="chart-panel">
        <canvas id="chart"></canvas>
      </div>

      <section class="hourly-panel" aria-labelledby="hourly-title">
        <h2 id="hourly-title">Pe ore, fiecare zi</h2>
        <div id="hourly-list" class="hourly-list"></div>
      </section>
    </section>
  </main>

  <nav class="tabs" aria-label="Navigare">
    <button data-screen="today" class="tab active" type="button">Azi</button>
    <button data-screen="workout" class="tab" type="button">Antrenament</button>
    <button data-screen="stats" class="tab" type="button">Statistici</button>
  </nav>

  <script src="./vendor/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/app.js?v=single-day-hourly"></script>
</body>
</html>
